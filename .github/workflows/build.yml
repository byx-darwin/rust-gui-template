name: build

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-rust:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup toolchain install stable --component llvm-tools-preview

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - uses: Swatinem/rust-cache@v2

      - name: Check code format
        if: runner.os == 'Linux'
        run: cargo +nightly fmt -- --check

      - name: Check the package for errors
        run: cargo check --workspace --all-targets --all-features

      - name: Lint rust sources
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check dependency licenses and advisories
        if: runner.os == 'Linux'
        run: cargo deny check

      - name: Check for known security vulnerabilities
        if: runner.os == 'Linux'
        run: cargo audit

      - name: Execute rust tests
        run: cargo nextest run --all-features

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Parse MSRV
        id: msrv
        run: |
          MSRV=$(grep 'rust-version' Cargo.toml | head -1 | sed 's/.*= *"//' | sed 's/"//')
          echo "msrv=$MSRV" >> "$GITHUB_OUTPUT"

      - name: Install MSRV toolchain
        run: rustup toolchain install ${{ steps.msrv.outputs.msrv }}

      - name: Check with MSRV
        run: cargo +${{ steps.msrv.outputs.msrv }} check --workspace --all-features
